<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Journey | Thanjai</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --love-pink: #ff85a2;
            --bg-dark: #000;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg-dark);
            font-family: 'Kanit', sans-serif;
            color: white;
            overflow: hidden;
            touch-action: manipulation; 
        }

        #bgm, #loveSound { display: none; }

        #loader {
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--love-pink); font-size: 1.2rem; transition: opacity 0.8s ease;
        }
        .spinner { margin-bottom: 15px; font-size: 2.5rem; animation: pulse 1s infinite alternate; }

        .story-progress {
            position: fixed; top: 15px; left: 10px; right: 10px;
            display: flex; gap: 5px; z-index: 30;
        }
        .bar {
            flex: 1; height: 3px; background: rgba(255,255,255,0.3);
            border-radius: 5px; overflow: hidden;
        }
        .fill { height: 100%; width: 0%; background: white; border-radius: 5px; }

        .global-timer {
            position: fixed; top: 40px; width: 100%; text-align: center; z-index: 20;
            background: rgba(0,0,0,0.3); padding: 10px 0; backdrop-filter: blur(5px);
            font-size: 0.9rem; color: var(--love-pink); letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .slide-container { height: 100vh; width: 100%; position: relative; }

        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; filter: blur(10px); transform: scale(1.05);
            transition: opacity 0.8s ease, filter 0.8s ease, transform 0.8s ease, background 2s ease;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding-bottom: 80px; pointer-events: none;
        }

        .slide.active { 
            animation: slideEnter 0.8s ease forwards;
            z-index: 5; pointer-events: auto; 
        }

        @keyframes slideEnter {
            from { transform: scale(1.05); opacity: 0; filter: blur(10px); }
            to { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        .bg-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -2; filter: brightness(0.9) contrast(1.05);
        }
        .slide.active .bg-img {
            animation: zoomEffect 10s ease-out forwards;
        }
        @keyframes zoomEffect {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 70%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 10%, transparent 100%);
            z-index: -1;
        }

        .content { padding: 0 35px; text-align: left; margin-bottom: 40px; width: 100%; }

        .caption {
            font-size: clamp(1.3rem, 4vw, 1.6rem); font-weight: 500; line-height: 1.5;
            margin-bottom: 10px; color: #fff; text-shadow: 1px 1px 10px rgba(0,0,0,0.5);
            min-height: 70px; 
        }

        .final-title { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: var(--love-pink); margin-bottom: 10px; text-align: center; }
        .final-desc { font-size: clamp(1rem, 3vw, 1.2rem); margin-bottom: 5px; opacity: 0.9; text-align: center; }

        .choice-box {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px;
        }
        .btn-choice {
            background: #fff; color: #ff85a2; padding: 15px 10px;
            font-size: clamp(0.9rem, 3vw, 1.1rem); font-weight: 700;
            border-radius: 20px; border: none; cursor: pointer;
            box-shadow: 0 0 10px #ff85a2, 0 0 20px #ff85a2;
            transition: 0.2s; line-height: 1.3;
        }
        .btn-choice:hover { transform: scale(1.05); }

        .heart {
            position: fixed; color: #ff85a2; font-size: 20px;
            animation: float 3s linear forwards; pointer-events: none; z-index: 10;
        }
        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-300px) scale(1.5); opacity: 0; }
        }

        .particle {
            position: fixed; width: 4px; height: 4px;
            background: rgba(255,255,255,0.6); border-radius: 50%;
            animation: floatParticle 8s linear infinite; pointer-events: none; z-index: 1;
        }
        @keyframes floatParticle {
            from { transform: translateY(0); opacity: 0; }
            30% { opacity: 1; }
            to { transform: translateY(-100vh); opacity: 0; }
        }

        .premium-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: rgba(20, 0, 10, 0.85); backdrop-filter: blur(15px);
            padding: 40px 30px; border-radius: 25px; text-align: center;
            z-index: 999; border: 1px solid rgba(255, 133, 162, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(255, 133, 162, 0.2);
            opacity: 0; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            width: 85%; max-width: 400px;
        }
        @keyframes popIn {
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        #nameOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 100; display: none; 
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner">❤️</div>
        <div>Loading our memories...</div>
    </div>

    <div id="nameOverlay">
        <div id="namePopup" class="premium-popup">
            <div style="font-size:2rem;margin-bottom:10px;">❤️</div>
            <div style="font-size:1.2rem;margin-bottom:15px;color:white;">พิมพ์ชื่อเธอหน่อยสิ</div>

            <input id="nameInput" type="text" placeholder="เช่น บีม" autocomplete="off"
            style="
            width:100%;
            padding:12px;
            border-radius:15px;
            border:none;
            margin-bottom:20px;
            font-size:1.1rem;
            text-align:center;
            font-family: 'Kanit', sans-serif;
            outline: 2px solid var(--love-pink);
            ">

            <button id="startBtn"
            style="
            background:var(--love-pink);
            color:white;
            border:none;
            padding:15px 30px;
            border-radius:30px;
            font-size:1.1rem;
            font-family: 'Kanit', sans-serif;
            font-weight: 500;
            cursor:pointer;
            box-shadow: 0 5px 15px rgba(255, 133, 162, 0.4);
            width: 100%;
            ">
            เริ่มดูเรื่องของเรา
            </button>
        </div>
    </div>

    <audio id="bgm" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <audio id="loveSound"><source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9c4f45.mp3" type="audio/mpeg"></audio>

    <div class="story-progress" id="story-progress"></div>
    <div class="global-timer" id="timer-display">กำลังโหลดเวลาแห่งความสุข...</div>

    <div class="slide-container">
        <div class="slide active">
            <div class="bg-img" style="background-image: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=900&q=80');"></div>
            <div class="overlay"></div>
            <div class="content">
                <div class="caption" data-text="ยังจำวันแรกที่เจอกันได้ไหม...<br>10:30 น. วันนั้นคือจุดเริ่มต้นของทุกอย่าง"></div>
            </div>
        </div>

        <div class="slide">
            <div class="bg-img" style="background-image: url('https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=900&q=80');"></div>
            <div class="overlay"></div>
            <div class="content">
                <div class="caption" data-text="เวลาที่เราอยู่ด้วยกัน...<br>มีความสุขมากเลยนะรู้ไหม"></div>
            </div>
        </div>

        <div class="slide">
            <div class="bg-img" style="background-image: url('https://images.unsplash.com/photo-1522673607200-1648832cee98?auto=format&fit=crop&w=900&q=80');"></div>
            <div class="overlay"></div>
            <div class="content">
                <div class="caption" data-text="ไม่ว่าจะผ่านไปกี่ชั่วโมง<br>เธอก็ยังเป็นคนเดิมที่ทำให้เรายิ้มได้"></div>
            </div>
        </div>

        <div class="slide">
            <div class="bg-img" style="background-image: url('https://images.unsplash.com/photo-1494972308255-723781be9ad1?auto=format&fit=crop&w=900&q=80');"></div>
            <div class="overlay"></div>
            <div class="content">
                <div class="caption" data-text="ขอบคุณที่เดินมาด้วยกัน<br>จนถึงวินาทีนี้นะครับ"></div>
            </div>
        </div>

        <div class="slide" id="final-slide" style="background-color: #000;">
            <div class="content">
                <div class="final-title">เป็นแฟนกันนะ</div>
                <p class="final-desc">ตั้งแต่วันนั้นจนวันนี้</p>
                <p class="final-desc">เราอยากมีเธอในทุกวันต่อจากนี้</p>
                
                <div class="choice-box">
                    <button class="btn-choice">A. ตกลง ❤️</button>
                    <button class="btn-choice">B. ก็ได้ เป็นแฟนก็ได้ 😳</button>
                    <button class="btn-choice">C. รีบกดสิ เดี๋ยวเปลี่ยนใจนะ 😏</button>
                    <button class="btn-choice">D. โอเค ยอมให้เป็นแฟนก็ได้ ❤️</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        
        // 🔧 สร้าง Progress Bar อัตโนมัติ
        const progress = document.getElementById("story-progress");
        slides.forEach((slide, i) => {
            let bar = document.createElement("div");
            bar.className = "bar";
            let fill = document.createElement("div");
            fill.className = "fill";
            fill.id = "fill-" + i;
            bar.appendChild(fill);
            progress.appendChild(bar);
        });

        const DURATION = 8000; 
        let slideTimer;
        let typingInterval;

        // 🎵 Music Fade In
        const audio = document.getElementById('bgm');
        let bgmPlayed = false;
        
        function playMusic() {
            if (!bgmPlayed) {
                audio.volume = 0;
                audio.play().then(() => {
                    let v = 0;
                    let fade = setInterval(() => {
                        v += 0.05;
                        if (v >= 0.5) { v = 0.5; clearInterval(fade); }
                        audio.volume = v;
                    }, 200);
                }).catch(() => {});
                bgmPlayed = true;
            }
        }

        // 💌 ระบบถามชื่อ (ล็อคประตู เฉพาะคนพิเศษ) กันคลิกทะลุ
        let herName = "บีม"; 
        
        document.getElementById("startBtn").onclick = (e) => {
            e.stopPropagation(); // 🚨 หยุดการคลิกทะลุไปโดนสไลด์

            const input = document.getElementById("nameInput").value.trim();
            
            // 🚨 ตรวจสอบชื่อ (บีม หรือ beam)
            if(input !== "บีม" && input.toLowerCase() !== "beam"){
                alert("เอ๊ะ... ไม่ใช่ชื่อคนพิเศษของเรานี่นา ลองพิมพ์ชื่อ 'บีม' ดูนะ 🥺");
                document.getElementById("nameInput").value = ""; 
                document.getElementById("nameInput").focus();
                return; 
            }

            herName = "บีม"; 

            document.getElementById("nameOverlay").remove();

            // แทนคำว่า "เธอ" 
            document.querySelectorAll(".caption").forEach(c => {
                if(c.dataset.text){
                    c.dataset.text = c.dataset.text.replace(/เธอ/g, herName);
                }
            });

            document.querySelectorAll(".final-desc").forEach(p => {
                p.innerHTML = p.innerHTML.replace(/เธอ/g, herName);
            });

            // 🚀 เริ่มเล่นสไลด์ เพลง และพิมพ์ดีด
            playMusic();
            startStoryProgress(current);
            startTyping(current);
        };

        // ✍️ Typing Effect
        function startTyping(index) {
            clearInterval(typingInterval);
            const captionEl = slides[index].querySelector('.caption');
            if (!captionEl) return;
            
            const fullHTML = captionEl.getAttribute('data-text');
            if (!fullHTML) return;
            
            captionEl.innerHTML = "";
            let i = 0;
            typingInterval = setInterval(() => {
                if (i < fullHTML.length) {
                    if (fullHTML.charAt(i) === '<') {
                        let tag = "";
                        while (fullHTML.charAt(i) !== '>' && i < fullHTML.length) {
                            tag += fullHTML.charAt(i);
                            i++;
                        }
                        tag += '>';
                        captionEl.innerHTML += tag;
                    } else {
                        captionEl.innerHTML += fullHTML.charAt(i);
                    }
                    i++;
                } else {
                    clearInterval(typingInterval);
                }
            }, 60);
        }

        // ⏱️ Timer
        const startDate = new Date("February 14, 2026 10:30:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = Math.max(0, now - startDate); 

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            const timerDisplay = document.getElementById('timer-display');
            if (timerDisplay) {
                timerDisplay.innerHTML = `เราเจอกันมานาน ${d} วัน ${h} ชม. ${m} นาที ${s} วินาที แล้วนะ`;
            }
        }

        document.addEventListener("DOMContentLoaded", () => { updateTimer(); });
        setInterval(updateTimer, 1000);

        // 💡 Loader 
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    if(loader) loader.remove();
                    // โหลดเสร็จค่อยโชว์หน้าถามชื่อ
                    document.getElementById("nameOverlay").style.display = "flex";
                }, 800);
            }
        });

        // 📲 Story Progress
        function startStoryProgress(index) {
            clearTimeout(slideTimer);
            
            for(let i = 0; i < slides.length; i++) {
                const fill = document.getElementById('fill-' + i);
                if (!fill) continue; 
                fill.style.transition = 'none'; 
                if (i < index) fill.style.width = '100%';
                else fill.style.width = '0%';
            }

            setTimeout(() => {
                const currentFill = document.getElementById('fill-' + index);
                if (currentFill) {
                    currentFill.style.transition = `width ${DURATION}ms linear`;
                    currentFill.style.width = '100%';
                }
            }, 50);

            if (index < slides.length - 1) {
                slideTimer = setTimeout(() => { nextSlide(index + 1); }, DURATION);
            }
        }

        function nextSlide(index) {
            slides[current].classList.remove('active');
            current = index;
            slides[current].classList.add('active');
            
            startStoryProgress(current); 
            startTyping(current); 
            if (navigator.vibrate) navigator.vibrate(30);
        }

        // 👆 Touch & Tap
        let startX = 0;
        document.addEventListener("touchstart", e => {
            if(document.getElementById("nameOverlay")) return;

            clearTimeout(slideTimer); 
            playMusic();
            startX = e.touches[0].clientX;
        });

        document.addEventListener("touchend", e => {
            if(document.getElementById("nameOverlay")) return;

            let endX = e.changedTouches[0].clientX;
            let diffX = startX - endX;

            if (diffX > 50 && current < slides.length - 1) nextSlide(current + 1); 
            else if (diffX < -50 && current > 0) nextSlide(current - 1);
            else startStoryProgress(current); 
        });

        document.addEventListener("click", e => {
            if(document.getElementById("nameOverlay")) return;
            if(accepted) return; // 🚨 ล็อคหน้าจอไม่ให้สไลด์เลื่อนเมื่อกดตอบตกลงไปแล้ว
            playMusic();
            
            if(e.target.closest('button')) return; // 🚨 ป้องกันการคลิกโดนปุ่มแล้วสไลด์เปลี่ยน

            const clickX = e.clientX;
            const screenW = window.innerWidth;

            if (clickX < screenW * 0.3 && current > 0) nextSlide(current - 1);
            else if (clickX >= screenW * 0.3 && current < slides.length - 1) nextSlide(current + 1);
        });

        // 💖 Floating Hearts
        setInterval(() => {
            let heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤";
            heart.style.left = Math.random() * 100 + "%";
            heart.style.bottom = "-20px";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }, 1200);

        // ✨ Background Particles (ฝุ่นแสง)
        setInterval(() => {
            let p = document.createElement("div");
            p.className = "particle";
            p.style.left = Math.random() * 100 + "%";
            p.style.bottom = "-10px";
            p.style.animationDuration = (5 + Math.random() * 5) + "s";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 8000);
        }, 400);

        // 🎉 The Grand Finale (กันคลิกทะลุ)
        let accepted = false;
        document.querySelectorAll('.btn-choice').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation(); // 🚨 ป้องกันการคลิกทะลุไปโดนตัวสไลด์ด้านหลัง

                if (accepted) return;
                accepted = true;

                document.getElementById("loveSound").play().catch(()=>{});

                let burst = setInterval(() => {
                    confetti({
                        particleCount: 5, spread: 60, origin: { y: 0.7 },
                        colors: ['#ff85a2', '#ffffff', '#ff4d6d']
                    });
                }, 200);

                setTimeout(() => { clearInterval(burst); }, 4000);

                setTimeout(() => {
                    const finalSlide = document.getElementById('final-slide');
                    finalSlide.style.background = "radial-gradient(circle at center, #ff4d6d 0%, #000 80%)";
                }, 1000);

                setTimeout(() => {
                    let box = document.createElement("div");
                    box.className = "premium-popup";
                    box.innerHTML = `
                        <div style="font-size:3rem;margin-bottom:15px;">💍</div>
                        <div style="color:#fff;font-size:1.5rem;line-height:1.4;">
                            เย้! ตอนนี้เราเป็นแฟนกันแล้วนะ ${herName} ❤️
                        </div>
                        <div style="font-size:1rem;margin-top:15px;color:var(--love-pink);">
                            ดูแลทัตภณดีๆนะ โฮ่ง! 🐶
                        </div>
                    `;
                    document.body.appendChild(box);
                    
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                }, 2500);
            });
        });
    </script>
</body>
</html>
