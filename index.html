<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Our Journey | Thanjai</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --love-pink: #ff85a2;
            --bg-dark: #000;
        }

        * { 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box; 
        }

        body {
            margin: 0;
            background: #111; 
            font-family: 'Kanit', sans-serif;
            color: white;
            overflow: hidden; 
            touch-action: manipulation; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* 1️⃣ จำกัดความกว้างเนื้อหา (สำคัญสุด) */
        .container {
            width: 100%;
            max-width: 420px;
            height: 100%;
            position: relative;
            background: var(--bg-dark);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 133, 162, 0.1); 
        }

        /* 🎬 Intro Screen CSS */
        .intro-screen {
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10000; 
            padding: 40px 20px;
            transition: opacity 0.6s ease;
            cursor: pointer;
        }
        
        .intro-text {
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            color: white;
            max-width: 90%;
            line-height: 1.6;
            white-space: pre-line; 
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        
        .tap-to-continue {
            position: absolute;
            bottom: 40px;
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
            animation: blink 2s infinite;
            opacity: 0; 
            transition: opacity 1s;
        }
        
        @keyframes blink { 
            0%, 100% { opacity: 0.5; } 
            50% { opacity: 1; } 
        }

        /* 🌌 1. CSS พื้นหลังดาวเต็มท้องฟ้า */
        #stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -10;
            background: black;
        }

        /* 💥 CSS แฟลชแสงตอนหัวใจชนกัน */
        .love-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 9998;
        }

        /* 💍 CSS วงแหวน Shockwave ตอนชน */
        .shockwave-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            border: 10px solid #ff4d6d;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            pointer-events: none;
            z-index: 9990;
            box-shadow: 0 0 40px #ff4d6d, inset 0 0 40px #ff4d6d;
        }

        #bgm, #loveSound, #heartbeat, #boom { 
            display: none; 
        }

        #loader {
            position: absolute; 
            inset: 0; 
            background: var(--bg-dark); 
            z-index: 20000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            color: var(--love-pink); 
            font-size: 1.2rem; 
            transition: opacity 0.8s ease;
        }
        
        .spinner { 
            margin-bottom: 15px; 
            font-size: 2.5rem; 
            animation: pulse 1s infinite alternate; 
        }

        .story-progress {
            position: absolute; 
            top: 15px; 
            left: 10px; 
            right: 10px;
            display: flex; 
            gap: 5px; 
            z-index: 30;
        }
        
        .bar {
            flex: 1; 
            height: 4px; 
            background: rgba(255,255,255,0.2);
            border-radius: 5px; 
            overflow: hidden;
        }
        
        .fill { 
            height: 100%; 
            width: 0%; 
            background: linear-gradient(90deg, #ff85a2, #ff4d6d); 
            border-radius: 5px; 
            transition: width 0.3s ease;
        }

        .global-timer {
            position: absolute; 
            top: 40px; 
            width: 100%; 
            text-align: center; 
            z-index: 20;
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 100%);
            padding: 12px 0; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-size: 0.9rem; 
            color: #fff;
            text-shadow: 0 0 15px rgba(255,133,162,0.8);
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* 1️⃣ ซ่อน Slide Container ไว้ก่อน */
        .slide-container { 
            height: 100vh; 
            width: 100%; 
            position: relative; 
            display: none; 
        }

        /* 🎥 Cinematic Slide Transition */
        .slide {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            opacity: 0; 
            filter: blur(8px); 
            transform: scale(1.03) translateX(20px);
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), filter 0.8s ease, transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end;
            padding-bottom: 80px; 
            pointer-events: none;
        }

        .slide.active { 
            transform: scale(1) translateX(0);
            filter: blur(0);
            opacity: 1;
            z-index: 5; 
            pointer-events: auto; 
        }

        .slide.prev-out {
            transform: scale(0.98) translateX(-30px);
            opacity: 0;
            filter: blur(5px);
        }

        /* 📝 Class สำหรับ Slide ไม่มีรูป ให้อยู่กลางจอ */
        .center-slide {
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-bottom: 0;
        }
        
        .center-slide .content {
            margin-bottom: 0;
            text-align: center;
            width: 100%;
        }
        
        .center-slide .caption {
            font-size: clamp(1.7rem, 5.5vw, 2.4rem);
            line-height: 1.6;
            color: #fff;
        }
        .center-slide .caption {
            animation: textGlow 3s ease-in-out infinite;
        }
        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 30px rgba(255,133,162,0.6), 0 0 60px rgba(255,77,109,0.3); }
            50% { text-shadow: 0 0 45px rgba(255,77,109,0.8), 0 0 80px rgba(255,133,162,0.4); }
        }

        /* 🔒 หน้าแรก - ล็อคต้องกดปุ่มเท่านั้น */
        #first-slide .slide-content-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
        }
        .btn-next-slide {
            padding: 16px 50px;
            font-size: 1.15rem;
            font-family: 'Kanit', sans-serif;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #ff85a2 0%, #ff4d6d 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255, 77, 109, 0.5), 0 0 0 2px rgba(255,255,255,0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .btn-next-slide::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-next-slide:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 40px rgba(255, 77, 109, 0.6);
        }
        .btn-next-slide:hover::before { opacity: 1; }
        .btn-next-slide:active { transform: scale(1.02); }
        .btn-next-slide .btn-arrow {
            display: inline-block;
            margin-left: 8px;
            animation: btnArrow 1.5s ease-in-out infinite;
        }
        @keyframes btnArrow {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(5px); }
        }
        .first-slide-hint {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            animation: hintPulse 2s infinite;
        }
        @keyframes hintPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        @keyframes hintShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        @keyframes toastIn {
            from { transform: translateX(-50%) scale(0.8); opacity: 0; }
            to { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        .bg-img {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center; 
            background-color: transparent; 
            z-index: -2; 
            filter: brightness(0.8) contrast(0.9) sepia(30%) hue-rotate(-10deg) blur(1px);
        }
        
        .slide::after {
            content: ""; 
            position: absolute; 
            inset: 0; 
            z-index: -1; 
            pointer-events: none;
            background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns="http://www.w3.org/2000/svg" width="60" height="60"%3E%3Cfilter id="a"%3E%3CfeTurbulence type="fractalNoise" baseFrequency=".65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%" height="100%" filter="url(%23a)" opacity=".05"/%3E%3C/svg%3E');
        }

        .slide.active .bg-img {
            animation: zoomEffect 10s ease-out forwards;
        }
        
        @keyframes zoomEffect {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); } 
        }

        .overlay {
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 70%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 10%, transparent 100%);
            z-index: -1;
        }

        .content { 
            padding: 0 35px; 
            text-align: left; 
            margin-bottom: 40px; 
            width: 100%; 
        }

        .caption {
            font-size: clamp(1.3rem, 4vw, 1.6rem); 
            font-weight: 500; 
            line-height: 1.5;
            margin-bottom: 10px; 
            color: #fff; 
            text-shadow: 1px 1px 10px rgba(0,0,0,0.5);
            min-height: 70px; 
        }

        /* ------------------ จัด Layout หน้าสุดท้าย ------------------ */
        #final-slide .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%; 
            padding-bottom: 0;
            position: relative;
        }

        #final-text-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .final-title { 
            font-family: 'Dancing Script', cursive; 
            font-size: clamp(2.5rem, 8vw, 3.5rem); 
            color: var(--love-pink); 
            margin-bottom: 20px; 
            text-align: center; 
        }
        
        .final-desc { 
            font-size: clamp(1rem, 3vw, 1.2rem); 
            margin-bottom: 10px; 
            opacity: 0.9; 
            text-align: center; 
        }

        /* 3️⃣ แก้ปุ่ม A B C D ให้พอดีจอ */
        .choice-box {
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            padding: 20px;
            width: 100%; 
            margin-top: 10px;
            position: relative;
            z-index: 10;
        }
        
        .btn-choice {
            position: relative;
            background: linear-gradient(135deg, #fff 0%, #fff5f8 100%); 
            color: #ff85a2; 
            padding: 18px; 
            font-size: clamp(0.9rem, 4vw, 1.2rem); 
            font-weight: 700;
            border-radius: 20px; 
            border: none; 
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255,133,162,0.3), 0 0 15px rgba(255,133,162,0.2);
            transition: all 0.3s; 
            line-height: 1.3;
            overflow: hidden;
        }
        
        .btn-choice:hover { 
            transform: scale(1.06) perspective(500px) rotateX(2deg); 
            box-shadow: 0 8px 30px rgba(255,133,162,0.5), 0 0 25px rgba(255,77,109,0.3);
        }
        .btn-choice:active {
            transform: scale(1.02);
        }

        /* 💖 Background Heart */
        .heart-scene {
            position: absolute; 
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1; 
        }

        /* 4️⃣ big heart ใหญ่เกิน -> เปลี่ยนเป็นไซส์พอดี */
        .big-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(10rem, 45vw, 18rem); 
            opacity: 0.85; 
            z-index: 1;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            animation: heartBeat 1.2s infinite, heartGlow 2s infinite;
        }

        @keyframes heartGlow {
            0% { filter: drop-shadow(0 0 20px #ff4d6d) drop-shadow(0 0 40px #ff4d6d); }
            50% { filter: drop-shadow(0 0 40px #ff4d6d) drop-shadow(0 0 80px #ff4d6d); }
            100% { filter: drop-shadow(0 0 20px #ff4d6d) drop-shadow(0 0 40px #ff4d6d); }
        }

        @keyframes heartBeat {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .heart-wrapper {
            transform-style: preserve-3d;
            perspective: 800px;
            width: 100%;
            height: 100%;
        }

        .heart-collision {
            position: absolute;
            width: 100%;
            height: 150px;
            display: none; 
        }
        
        .heart-left, .heart-right {
            position: absolute;
            font-size: clamp(3rem, 10vw, 5rem);
            top: 50%;
            transform: translateY(-50%);
            z-index: 5;
        }
        
        .heart-left { left: -100px; }
        .heart-right { right: -100px; }
        
        .heart-left.fly { animation: heartLeft 1.5s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .heart-right.fly { animation: heartRight 1.5s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94); }

        @keyframes heartLeft {
            0% { left: -100px; }
            100% { left: calc(50% - 30px); } 
        }
        @keyframes heartRight {
            0% { right: -100px; }
            100% { right: calc(50% - 30px); }
        }

        .heart-pierced {
            animation: heartPop 0.6s ease-out forwards;
        }
        @keyframes heartPop {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2) rotate(-10deg); text-shadow: 0 0 50px rgba(255, 77, 109, 0.9); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); text-shadow: 0 0 40px rgba(255, 77, 109, 0.8); }
        }

        @keyframes heartBeatAfterHit {
            0% { transform: translate(-50%, -50%) scale(1); text-shadow: 0 0 40px rgba(255, 77, 109, 0.8); }
            50% { transform: translate(-50%, -50%) scale(1.05); text-shadow: 0 0 60px rgba(255, 77, 109, 1); }
            100% { transform: translate(-50%, -50%) scale(1); text-shadow: 0 0 40px rgba(255, 77, 109, 0.8); }
        }

        .heart {
            position: absolute; 
            color: #ff85a2; 
            font-size: 20px;
            animation: float 3s linear forwards; 
            pointer-events: none; 
            z-index: 10;
        }
        
        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-300px) scale(1.5); opacity: 0; }
        }

        .particle {
            position: absolute; 
            width: 4px; 
            height: 4px;
            background: rgba(255,255,255,0.6); 
            border-radius: 50%;
            animation: floatParticle 8s linear infinite; 
            pointer-events: none; 
            z-index: 1;
        }
        
        @keyframes floatParticle {
            from { transform: translateY(0); opacity: 0; }
            30% { opacity: 1; }
            to { transform: translateY(-100vh); opacity: 0; }
        }

        /* 4️⃣ แก้ popup ไม่ให้สูงเกิน (Glass Card) */
        .premium-popup {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            z-index: 9999;
            background: rgba(0, 0, 0, 0.45); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px; 
            border-radius: 20px; 
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 90%; 
            max-width: 90%; 
            opacity: 0; 
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        #nameOverlay {
            position: absolute; 
            inset: 0; 
            background: rgba(0,0,0,0.8);
            z-index: 15000; 
            display: none; 
        }

        /* 🔔 Toast แจ้งเตือนรหัสผิด - เห็นชัด 100% */
        .toast-wrong {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20000;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
            padding: 18px 28px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            box-shadow: 0 10px 40px rgba(255, 71, 87, 0.6), 0 0 0 3px rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: toastPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), toastShake 0.5s 0.4s;
        }
        @keyframes toastPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        @keyframes toastShake {
            0%, 100% { transform: translate(-50%, -50%) translateX(0); }
            25% { transform: translate(-50%, -50%) translateX(-8px); }
            75% { transform: translate(-50%, -50%) translateX(8px); }
        }
        .input-shake {
            animation: inputShake 0.6s ease;
        }
        @keyframes inputShake {
            0%, 100% { transform: translateX(0); border-color: #ff4757; }
            20% { transform: translateX(-12px); }
            40% { transform: translateX(12px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }
        .input-error {
            box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.6) !important;
            outline: 2px solid #ff4757 !important;
        }

        /* ✨ NEW: Swipe hint */
        .swipe-hint {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            z-index: 25;
            animation: swipePulse 2s infinite;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .slide-mode .swipe-hint { opacity: 1; }
        @keyframes swipePulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .swipe-hint svg {
            width: 24px;
            height: 24px;
            animation: swipeArrow 1.5s infinite;
        }
        @keyframes swipeArrow {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }

        /* ✨ NEW: Music toggle button */
        .music-toggle {
            position: fixed;
            bottom: 25px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            opacity: 0;
        }
        .slide-mode .music-toggle { opacity: 1; }
        .music-toggle:hover, .music-toggle.active { 
            background: rgba(255, 133, 162, 0.6); 
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 133, 162, 0.4);
        }
        .music-toggle svg { width: 22px; height: 22px; }

        /* ✨ NEW: Slide number indicator */
        .slide-num {
            position: fixed;
            bottom: 25px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            z-index: 25;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .slide-mode .slide-num { opacity: 1; }

        /* ✨ NEW: Fancy choice button glow */
        .btn-choice {
            position: relative;
            overflow: hidden;
        }
        .btn-choice::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            padding: 2px;
            background: linear-gradient(135deg, #ff85a2, #ff4d6d);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-choice:hover::before { opacity: 1; }
        .btn-choice:active { transform: scale(0.98); }

        /* ✨ NEW: Ripple effect on tap */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transform: scale(0);
            animation: rippleAnim 0.6s ease-out;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        /* ✨ NEW: Premium popup close */
        .popup-close {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 1;
        }

        /* ✨ NEW: Photo tap zoom */
        .slide .bg-img {
            transition: transform 0.4s ease, filter 0.4s ease;
        }
        .slide .bg-img.zoomed {
            transform: scale(1.08);
            filter: brightness(0.95) contrast(1.05) sepia(20%);
        }

        /* ✨ NEW: Love meter decorative */
        .love-sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ff85a2;
            border-radius: 50%;
            opacity: 0;
            animation: sparklePop 0.8s ease-out forwards;
            pointer-events: none;
        }
        @keyframes sparklePop {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="app-container">

        <div id="loader">
            <div class="spinner">❤️</div>
            <div>Loading our memories...</div>
        </div>

        <div class="intro-screen" id="intro">
            <div class="intro-text" id="introText"></div>
            <div class="tap-to-continue" id="tapText">แตะหน้าจอเพื่อไปต่อ</div>
        </div>

        <canvas id="stars"></canvas>
        
        <div id="flash" class="love-flash"></div>

        <div id="nameOverlay" style="align-items:center;justify-content:center;display:none;">
            <div id="namePopup" class="premium-popup" style="transform:translate(-50%,-50%);position:absolute;top:50%;left:50%;">
                <div style="font-size:2rem;margin-bottom:10px;">❤️</div>
                <div style="font-size:1.2rem;margin-bottom:15px;color:white;">ใส่รหัสผ่านเพื่อเข้าเรื่องของเรา</div>

                <input id="nameInput" type="text" placeholder="เช่น ที่ร้ากก" autocomplete="off"
                style="width:100%; padding:14px 16px; border-radius:15px; border:2px solid rgba(255,255,255,0.3); margin-bottom:20px; font-size:1.1rem; text-align:center; font-family: 'Kanit', sans-serif; outline: none; background: rgba(255,255,255,0.1); color: white; transition: all 0.3s;">

                <button id="startBtn" style="background:var(--love-pink); color:white; border:none; padding:15px 30px; border-radius:30px; font-size:1.1rem; font-family: 'Kanit', sans-serif; font-weight: 500; cursor:pointer; box-shadow: 0 5px 15px rgba(255, 133, 162, 0.4); width: 100%;">
                เริ่มดูเรื่องของเรา
                </button>
            </div>
            <div id="wrongToast" class="toast-wrong" style="display:none;">⚠️ รหัสไม่ถูกต้องนะ ลองใหม่! 🥺</div>
        </div>

        <audio id="bgm" loop><source src="music.mp3" type="audio/mpeg"></audio>
        <audio id="loveSound"><source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9c4f45.mp3" type="audio/mpeg"></audio>
        <audio id="heartbeat" loop><source src="https://cdn.pixabay.com/audio/2022/03/24/audio_c8c8a73467.mp3" type="audio/mpeg"></audio>
        <audio id="boom"><source src="https://cdn.pixabay.com/audio/2021/08/04/audio_12b0c7443c.mp3" type="audio/mpeg"></audio>

        <div class="story-progress" id="story-progress"></div>
        <div class="global-timer" id="timer-display">กำลังโหลดเวลาแห่งความสุข...</div>
        <div class="swipe-hint" id="swipeHint">ปัดซ้าย-ขวาเพื่อเปลี่ยนหน้า <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg></div>
        <div class="slide-num" id="slideNum"></div>
        <button class="music-toggle" id="musicToggle" title="เปิด/ปิดเพลง"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></button>

        <div class="slide-container">
            
            <div class="slide active center-slide" id="first-slide">
                <div class="content">
                    <div class="slide-content-wrap">
                        <div class="caption" data-text="วันนั้นเราไม่รู้เลยว่า<br>มันจะกลายเป็นเรื่องราวของเรา"></div>
                        <button class="btn-next-slide" id="btnFirstNext">ไปต่อกันเลย <span class="btn-arrow">→</span></button>
                        <div class="first-slide-hint">กดปุ่มเพื่อไปหน้าถัดไป</div>
                    </div>
                </div>
            </div>

            <div class="slide">
                <div class="bg-img" style="background-image: url('https://img2.pic.in.th/aaaaa8bbc1a2ae958ca03.jpg');"></div>
                <div class="overlay"></div>
                <div class="content">
                    <div class="caption" data-text="ยังจำวันแรกที่เจอกันได้ไหม...<br>10:30 น. วันนั้นคือจุดเริ่มต้นของทุกอย่าง"></div>
                </div>
            </div>

            <div class="slide">
                <div class="bg-img" style="background-image: url('https://img2.pic.in.th/image7581dfb29df84129.png');"></div>
                <div class="overlay"></div>
                <div class="content">
                    <div class="caption" data-text="เวลาที่เราอยู่ด้วยกัน...<br>มีความสุขมากเลยนะรู้ไหม"></div>
                </div>
            </div>

            <div class="slide">
                <div class="bg-img" style="background-image: url('https://img2.pic.in.th/love.jpg');"></div>
                <div class="overlay"></div>
                <div class="content">
                    <div class="caption" data-text="ไม่ว่าจะผ่านไปกี่ชั่วโมง<br>เธอก็ยังเป็นคนเดิมที่ทำให้เรายิ้มได้"></div>
                </div>
            </div>

            <div class="slide">
                <div class="bg-img" style="background-image: url('https://img5.pic.in.th/file/secure-sv1/love_r.jpg');"></div>
                <div class="overlay"></div>
                <div class="content">
                    <div class="caption" data-text="ขอบคุณที่เดินมาด้วยกัน<br>จนถึงวินาทีนี้นะครับ"></div>
                </div>
            </div>

            <div class="slide" id="final-slide" style="background-color: transparent; transition: background 1.5s ease;">
                <div class="content">
                    
                    <div id="final-text-content">
                        <div class="final-title">เป็นแฟนกันนะ</div>
                        <p class="final-desc">ตั้งแต่วันนั้นจนวันนี้</p>
                        <p class="final-desc">เราอยากมีเธอในทุกวันต่อจากนี้</p>
                        
                        <div class="choice-box" id="the-choices">
                            <button class="btn-choice">A. ตกลง ❤️</button>
                            <button class="btn-choice">B. ก็ได้ เป็นแฟนก็ได้ 😳</button>
                            <button class="btn-choice">C. รีบกดสิ เดี๋ยวเปลี่ยนใจนะ 😏</button>
                            <button class="btn-choice">D. โอเค ยอมให้เป็นแฟนก็ได้ ❤️</button>
                        </div>
                    </div>

                    <div class="heart-scene">
                        <div class="heart-collision" id="the-collision">
                            <div class="heart-left" id="h-left">❤️</div>
                            <div class="heart-right" id="h-right">❤️</div>
                        </div>
                        
                        <div class="heart-wrapper" id="the-heart-wrapper" style="display: none;">
                            <div class="big-heart" id="the-heart">❤️</div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div> 

    <script>
        const appContainer = document.getElementById("app-container"); 
        let canSlide = false; 

        document.addEventListener("DOMContentLoaded", () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.remove();
                        setTimeout(typeIntro, 300);
                    }, 800);
                }
            }, 1500); 
        });

        const introMessage = "วันนี้มีอะไรอยากเล่าให้ฟัง...\n\nเกี่ยวกับวันแรกที่เราเจอกัน\n\nและทุกอย่างหลังจากนั้น";
        let introIndex = 0;
        let isIntroFinished = false;
        let typeTimeout;
        let introClicked = false;

        function typeIntro() {
            if (introIndex < introMessage.length) {
                let char = introMessage.charAt(introIndex);
                if(char === '\n') {
                    document.getElementById("introText").innerHTML += "<br>";
                } else {
                    document.getElementById("introText").innerHTML += char;
                }
                introIndex++;
                typeTimeout = setTimeout(typeIntro, 80);
            } else {
                isIntroFinished = true;
                document.getElementById("tapText").style.opacity = "1";
            }
        }

        document.getElementById("intro").addEventListener("click", () => {
            if(!isIntroFinished || introClicked) return; 
            introClicked = true;
            
            clearTimeout(typeTimeout); 
            const intro = document.getElementById("intro");
            intro.style.opacity = "0";
            
            setTimeout(() => {
                intro.remove();
                document.getElementById("nameOverlay").style.display = "flex";
            }, 400);
        });

        document.getElementById("nameInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                document.getElementById("startBtn").click();
            }
        });

        // 🌌 JS ดาววิบวับ + ดาวตก
        const canvas = document.getElementById("stars");
        const ctx = canvas.getContext("2d");
        
        function resizeCanvas() {
            canvas.width = appContainer.clientWidth;
            canvas.height = appContainer.clientHeight;
        }
        resizeCanvas();
        
        let stars = [];
        let shootingStars = [];

        for(let i=0; i<80; i++){
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 1.2,
                depth: Math.random(), 
                alpha: Math.random() 
            });
        }

        window.addEventListener("deviceorientation", e => {
            if(!e.gamma) return;
            stars.forEach(s => {
                s.x += e.gamma * 0.02 * s.depth;
            });
        });

        setInterval(()=>{
            shootingStars.push({
                x: Math.random() * canvas.width,
                y: 0,
                len: 300,
                speed: 12
            })
        }, 7000)

        function drawStars(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            
            stars.forEach(s=>{
                ctx.globalAlpha = s.alpha;
                ctx.fillStyle="white";
                ctx.beginPath();
                ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
                ctx.fill();

                s.y += s.speed * (0.5 + s.depth);
                s.alpha += (Math.random()-0.5)*0.05;
                
                if(s.alpha < 0.2) s.alpha = 0.2;
                if(s.alpha > 1) s.alpha = 1;

                if(s.y > canvas.height){
                    s.y = 0;
                    s.x = Math.random() * canvas.width;
                }
            });

            ctx.globalAlpha = 1; 
            shootingStars.forEach((s, i)=>{
                ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
                ctx.lineWidth = 2;

                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(s.x - s.len, s.y + s.len);
                ctx.stroke();

                s.x += s.speed;
                s.y += s.speed;

                if(s.y > canvas.height + 200){
                    shootingStars.splice(i, 1);
                }
            });

            requestAnimationFrame(drawStars);
        }
        drawStars();

        window.addEventListener('resize', resizeCanvas);

        // ✨ Shake phone = hearts burst (เทพ! mobile easter egg)
        let lastShake = 0;
        if (window.DeviceMotionEvent) {
            let ax = 0, ay = 0, az = 0;
            window.addEventListener('devicemotion', (e) => {
                const a = e.accelerationIncludingGravity || e.acceleration;
                if (!a) return;
                const dx = Math.abs(a.x - ax), dy = Math.abs(a.y - ay), dz = Math.abs(a.z - az);
                ax = a.x; ay = a.y; az = a.z;
                if ((dx > 15 || dy > 15 || dz > 15) && Date.now() - lastShake > 1500) {
                    lastShake = Date.now();
                    const hearts = ['❤️','💕','💗','💖','💝'];
                    for (let i = 0; i < 20; i++) {
                        const h = document.createElement("div");
                        h.className = "heart";
                        h.innerHTML = hearts[Math.floor(Math.random()*hearts.length)];
                        h.style.left = (30 + Math.random() * 40) + "%";
                        h.style.bottom = "-20px";
                        h.style.fontSize = (18 + Math.random()*12) + "px";
                        appContainer.appendChild(h);
                        setTimeout(() => h.remove(), 3500);
                    }
                    if (navigator.vibrate) navigator.vibrate(30);
                    if (typeof confetti === 'function') confetti({ particleCount: 25, spread: 50, origin: { y: 0.8 } });
                }
            });
        }

        // ---------------- โค้ดควบคุมระบบ Slide -----------------
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        const progress = document.getElementById("story-progress");
        
        slides.forEach((slide, i) => {
            let bar = document.createElement("div");
            bar.className = "bar";
            let fill = document.createElement("div");
            fill.className = "fill"; 
            fill.id = "fill-" + i;
            bar.appendChild(fill); 
            progress.appendChild(bar);
        });

        const DURATION = 8000; 
        let slideTimer; 
        let typingInterval;

        const audio = document.getElementById('bgm');
        let bgmPlayed = false;
        let bgmMuted = false;
        
        function playMusic() {
            if (!bgmPlayed) {
                audio.volume = 0;
                audio.play().then(() => {
                    let v = 0;
                    let fade = setInterval(() => {
                        if (bgmMuted) return;
                        v += 0.05; 
                        if (v >= 0.5) { v = 0.5; clearInterval(fade); }
                        audio.volume = v;
                    }, 250);
                }).catch(() => {});
                bgmPlayed = true;
                document.getElementById('musicToggle').classList.add('active');
            }
        }

        document.getElementById('musicToggle').addEventListener('click', () => {
            bgmMuted = !bgmMuted;
            audio.muted = bgmMuted;
            document.getElementById('musicToggle').classList.toggle('active', !bgmMuted);
            if (navigator.vibrate) navigator.vibrate(20);
        });

        let herName = "บีม"; 
        
        document.getElementById("startBtn").onclick = (e) => {
            e.stopPropagation(); 
            const input = document.getElementById("nameInput").value.trim();
            
            if(input !== "2545"){
                const inp = document.getElementById("nameInput");
                const toast = document.getElementById("wrongToast");
                inp.classList.add("input-shake", "input-error");
                toast.style.display = "flex";
                toast.style.opacity = "1";
                toast.style.zIndex = "25000";
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                inp.value = "";
                inp.focus();
                setTimeout(() => {
                    inp.classList.remove("input-shake", "input-error");
                    toast.style.display = "none";
                }, 2800);
                return; 
            }

            herName = "บีม"; 
            if (typeof confetti === 'function') confetti({ particleCount: 60, spread: 70, origin: { y: 0.5 } });
            document.getElementById("nameOverlay").remove();
            appContainer.classList.add('slide-mode');

            // 🔊 ปลดล็อกระบบเสียงทั้งหมดสำหรับ iPhone
            document.getElementById("loveSound").play().catch(()=>{}); document.getElementById("loveSound").pause();
            document.getElementById("heartbeat").play().catch(()=>{}); document.getElementById("heartbeat").pause();
            document.getElementById("boom").play().catch(()=>{}); document.getElementById("boom").pause();

            document.querySelector(".slide-container").style.display = "block";

            document.querySelectorAll(".caption").forEach(c => {
                if(c.dataset.text){ 
                    c.dataset.text = c.dataset.text.replace(/เธอ/g, herName); 
                }
            });
            
            document.querySelectorAll(".final-desc").forEach(p => {
                p.innerHTML = p.innerHTML.replace(/เธอ/g, herName);
            });

            playMusic();
            startStoryProgress(current);
            startTyping(current);
            updateSlideUI();

            setTimeout(() => {
                canSlide = true;
            }, 1000);
        };

        function startTyping(index) {
            clearInterval(typingInterval);
            const captionEl = slides[index].querySelector('.caption');
            if (!captionEl) return;
            
            const fullHTML = captionEl.getAttribute('data-text');
            if (!fullHTML) return;
            
            captionEl.innerHTML = "";
            let i = 0;
            typingInterval = setInterval(() => {
                if (i < fullHTML.length) {
                    if (fullHTML.charAt(i) === '<') {
                        let tag = "";
                        while (fullHTML.charAt(i) !== '>' && i < fullHTML.length) {
                            tag += fullHTML.charAt(i); 
                            i++;
                        }
                        tag += '>'; 
                        captionEl.innerHTML += tag;
                    } else { 
                        captionEl.innerHTML += fullHTML.charAt(i); 
                    }
                    i++;
                } else { 
                    clearInterval(typingInterval); 
                }
            }, 60);
        }

        const startDate = new Date("February 14, 2026 10:30:00").getTime();
        
        function updateTimer() {
            const now = new Date().getTime();
            const diff = Math.max(0, now - startDate); 
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            const timerDisplay = document.getElementById('timer-display');
            if (timerDisplay) { 
                timerDisplay.innerHTML = `เราเจอกันมานาน ${d} วัน ${h} ชม. ${m} นาที ${s} วินาที แล้วนะ`; 
            }
        }
        
        let timerInterval = setInterval(updateTimer, 1000);

        function startStoryProgress(index) {
            clearTimeout(slideTimer);
            for(let i = 0; i < slides.length; i++) {
                const fill = document.getElementById('fill-' + i);
                if (fill) { 
                    fill.style.transition = 'none'; 
                    fill.style.width = i < index ? '100%' : '0%'; 
                }
            }
            setTimeout(() => {
                const currentFill = document.getElementById('fill-' + index);
                if (currentFill) { 
                    currentFill.style.transition = `width ${DURATION}ms linear`; 
                    currentFill.style.width = '100%'; 
                }
            }, 50);
            if (index === 0) {
                return;
            }
            if (index < slides.length - 1) { 
                slideTimer = setTimeout(() => { nextSlide(index + 1); }, DURATION); 
            }
        }

        document.getElementById('btnFirstNext').addEventListener('click', (e) => {
            e.stopPropagation();
            if (current !== 0) return;
            if (typeof confetti === 'function') confetti({ particleCount: 40, spread: 60, origin: { y: 0.8 } });
            nextSlide(1);
        });

        function updateSlideUI() {
            const sh = document.getElementById('swipeHint');
            const sn = document.getElementById('slideNum');
            if (current === 0) {
                if (sh) { sh.style.opacity = '0'; sh.textContent = ''; }
                if (sn) sn.textContent = '1 / ' + slides.length;
            } else if (current === slides.length - 1) {
                if (sh) sh.style.opacity = '0';
                if (sn) sn.textContent = '';
            } else {
                if (sh) { sh.style.opacity = '1'; sh.innerHTML = 'ปัดซ้าย-ขวาเพื่อเปลี่ยนหน้า <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>'; }
                if (sn) sn.textContent = `${current + 1} / ${slides.length}`;
            }
        }

        function nextSlide(index) {
            slides[current].classList.remove('active');
            current = index;
            slides[current].classList.add('active');
            startStoryProgress(current); 
            startTyping(current); 
            updateSlideUI();
            if (navigator.vibrate) { navigator.vibrate(30); }
            
            if(current === slides.length - 1) {
                let hb = document.getElementById("heartbeat");
                hb.volume = 1.0;
                hb.play().catch(()=>{});

                document.getElementById('timer-display').style.opacity = '0'; 
            } else {
                document.getElementById('timer-display').style.opacity = '1'; 
            }
        }

        let startX = 0;
        document.addEventListener("touchstart", e => {
            if(!canSlide || accepted) return;
            clearTimeout(slideTimer); 
            startX = e.touches[0].clientX;
        });

        document.addEventListener("touchend", e => {
            if(!canSlide || accepted) return;
            let endX = e.changedTouches[0].clientX; 
            let diffX = startX - endX;
            if (current === 0) {
                if (Math.abs(diffX) > 50) {
                    const t = document.createElement('div');
                    t.textContent = '👆 กดปุ่มเพื่อไปต่อนะ';
                    t.style.cssText = 'position:fixed;bottom:30%;left:50%;transform:translateX(-50%);background:rgba(255,133,162,0.95);color:white;padding:12px 24px;border-radius:50px;font-size:0.95rem;z-index:99999;animation:toastIn 0.3s ease;box-shadow:0 5px 25px rgba(255,77,109,0.5);';
                    appContainer.appendChild(t);
                    t.animate([{opacity:1},{opacity:0}],{duration:800,delay:1200,fill:'forwards'});
                    setTimeout(()=>t.remove(),2000);
                    if (navigator.vibrate) navigator.vibrate(50);
                }
                startStoryProgress(0); return;
            }
            if (diffX > 50 && current < slides.length - 1) { nextSlide(current + 1); } 
            else if (diffX < -50 && current > 0) { nextSlide(current - 1); } 
            else { startStoryProgress(current); }
        });

        document.addEventListener("click", e => {
            if(!canSlide || accepted) return;
            if(e.target.closest('button') || e.target.tagName.toLowerCase() === 'input') return; 
            if (current === 0) {
                const t = document.createElement('div');
                t.textContent = '👆 กดปุ่ม "ไปต่อกันเลย" เพื่อไปต่อนะ';
                t.style.cssText = 'position:fixed;bottom:30%;left:50%;transform:translateX(-50%);background:rgba(255,133,162,0.95);color:white;padding:12px 24px;border-radius:50px;font-size:0.9rem;z-index:99999;animation:toastIn 0.3s ease;box-shadow:0 5px 25px rgba(255,77,109,0.5);max-width:85%;text-align:center;';
                appContainer.appendChild(t);
                t.animate([{opacity:1},{opacity:0}],{duration:800,delay:1500,fill:'forwards'});
                setTimeout(()=>t.remove(),2300);
                if (navigator.vibrate) navigator.vibrate(30);
                return;
            }
            
            const rect = appContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left; 
            
            if(clickX >= 0 && clickX <= rect.width) {
                if (clickX < rect.width * 0.3 && current > 0) { nextSlide(current - 1); } 
                else if (clickX >= rect.width * 0.3 && current < slides.length - 1) { nextSlide(current + 1); }
            }
        });

        // ✨ Photo tap to zoom (slides with images)
        document.querySelectorAll('.slide .bg-img').forEach(img => {
            img.addEventListener('click', (e) => {
                e.stopPropagation();
                img.classList.toggle('zoomed');
            });
        });

        // ✨ Double-tap anywhere = sparkles + hearts (เทพ!)
        let lastTap = 0;
        appContainer.addEventListener('click', (e) => {
            if (e.target.closest('button')) return;
            const now = Date.now();
            if (now - lastTap < 350) {
                const rect = appContainer.getBoundingClientRect();
                const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
                const emojis = ['✨','💕','💗','⭐','🌸','💖'];
                for (let i = 0; i < 15; i++) {
                    const dx = (Math.random()-0.5)*180, dy = -60 - Math.random()*140;
                    const s = document.createElement('div');
                    s.style.cssText = `position:absolute;left:${cx}px;top:${cy}px;font-size:${20+Math.random()*24}px;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);`;
                    s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
                    appContainer.appendChild(s);
                    s.animate([
                        { transform: 'translate(-50%,-50%) scale(0)', opacity: 1 },
                        { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(1.3)`, opacity: 0 }
                    ], { duration: 1200, easing: 'ease-out' });
                    setTimeout(() => s.remove(), 1200);
                }
                if (typeof confetti === 'function') confetti({ particleCount: 40, spread: 80, origin: { x: cx/rect.width, y: cy/rect.height } });
            }
            lastTap = now;
        });

        setInterval(() => {
            let heart = document.createElement("div");
            heart.className = "heart"; 
            heart.innerHTML = "❤";
            heart.style.left = Math.random() * 100 + "%"; 
            heart.style.bottom = "-20px";
            appContainer.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 3000);
        }, 1200);

        setInterval(() => {
            let p = document.createElement("div");
            p.className = "particle"; 
            p.style.left = Math.random() * 100 + "%";
            p.style.bottom = "-10px"; 
            p.style.animationDuration = (5 + Math.random() * 5) + "s";
            appContainer.appendChild(p);
            setTimeout(() => { p.remove(); }, 8000);
        }, 400);

        function loveRays(){
            for(let i=0; i<12; i++){
                let ray = document.createElement("div");
                ray.style.position = "absolute";
                ray.style.left = "50%";
                ray.style.top = "50%";
                ray.style.width = "4px";
                ray.style.height = "200px";
                ray.style.background = "linear-gradient(transparent,#ff4d6d)";
                ray.style.transformOrigin = "bottom";
                ray.style.zIndex = "9990";

                let angle = i * 30;
                ray.style.transform = `translate(-50%,-100%) rotate(${angle}deg)`;

                appContainer.appendChild(ray);

                ray.animate([
                    {opacity:1, transform:`translate(-50%,-100%) rotate(${angle}deg) scaleY(0)`},
                    {opacity:0, transform:`translate(-50%,-100%) rotate(${angle}deg) scaleY(2)`}
                ],{duration:800});

                setTimeout(()=>ray.remove(), 800);
            }
        }

        function heartExplosion(){
            for(let i=0; i<120; i++){
                let h = document.createElement("div");
                h.innerHTML = "❤️";
                h.style.position = "absolute";
                h.style.left = "50%";
                h.style.top = "50%";
                h.style.fontSize = (20 + Math.random()*40) + "px"; 
                h.style.pointerEvents = "none";
                h.style.zIndex = "9999";

                appContainer.appendChild(h);

                let x = (Math.random()-0.5)*800;
                let y = (Math.random()-0.5)*800;

                h.animate([
                    {transform:"translate(-50%,-50%) scale(1)",opacity:1},
                    {transform:`translate(${x}px,${y}px) scale(0.5)`,opacity:0}
                ],{
                    duration: 2000,
                    easing: "cubic-bezier(0.25, 0.46, 0.45, 0.94)"
                });

                setTimeout(()=>h.remove(), 2000);
            }
        }

        // 🎉 The Grand Finale 
        let accepted = false;
        let miniHeartInterval; 

        function createRipple(btn, e) {
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height) * 1.5;
            const r = document.createElement('span');
            r.className = 'ripple';
            r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px;`;
            btn.style.position = 'relative';
            btn.style.overflow = 'hidden';
            btn.appendChild(r);
            setTimeout(() => r.remove(), 600);
        }

        document.querySelectorAll('.btn-choice').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                createRipple(btn, e);

                if (accepted) return;
                accepted = true;

                if (typeof confetti === 'function') {
                    const colors = ['#ff85a2','#ff4d6d','#ffd700','#fff','#ff9a9e'];
                    confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors });
                    setTimeout(() => confetti({ particleCount: 80, angle: 60, spread: 55, origin: { x: 0 }, colors }), 150);
                    setTimeout(() => confetti({ particleCount: 80, angle: 120, spread: 55, origin: { x: 1 }, colors }), 300);
                }

                // 🛑 หยุดเสียงตึกตัก
                document.getElementById("heartbeat").pause();

                const finalTextContent = document.getElementById("final-text-content");
                if(finalTextContent) {
                    finalTextContent.style.opacity = "0";
                    finalTextContent.style.pointerEvents = "none";
                    setTimeout(() => finalTextContent.style.display = "none", 500);
                }

                const heartWrapper = document.getElementById("the-heart-wrapper");
                const heart = document.getElementById("the-heart");
                const collision = document.getElementById("the-collision");
                const hLeft = document.getElementById("h-left");
                const hRight = document.getElementById("h-right");
                
                heartWrapper.style.display = "none";
                collision.style.display = "block";
                hLeft.classList.add("fly");
                hRight.classList.add("fly");

                // ⏰ หยุดเวลาและแสดงเวลาคบกัน
                clearInterval(timerInterval);
                const now = new Date();
                const timeString = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + ' น.';
                const timerDisplay = document.getElementById('timer-display');

                // 🚨 แจ้งเตือนเข้า Discord
                const webhookUrl = "Https://discord.com/api/webhooks/1481709108007538890/kFM9AoV2rUlxH2PeEztCjJ0sO91dbwB-kIXOmibjzRqY4hQRSVYuN8uTmSFrlxY_Lcj1";
                const timeClicked = new Date().toLocaleString('th-TH');
                fetch(webhookUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        content: `🎉 **บีมกดตกลงเป็นแฟนแล้วนะ!** 💍\n⏰ เวลา: ${timeClicked}\n(เตรียมฉลองได้เลยทัตภณ! 🐶)`
                    })
                }).catch(err => console.log("Silent error"));

                setTimeout(() => {
                    // 💥 เล่นเสียงตู้ม และเสียงป๊อป
                    let boomSound = document.getElementById("boom");
                    boomSound.volume = 1.0;
                    boomSound.play().catch(()=>{});

                    let loveS = document.getElementById("loveSound");
                    loveS.volume = 1.0;
                    loveS.play().catch(()=>{});
                    
                    const flash = document.getElementById("flash");
                    if (flash) {
                        flash.animate([{opacity:0}, {opacity:0.8}, {opacity:0}],{ duration: 400 });
                    }

                    loveRays();
                    
                    let ring = document.createElement("div");
                    ring.className = "shockwave-ring";
                    appContainer.appendChild(ring);
                    ring.animate([
                        { transform: "translate(-50%, -50%) scale(0)", opacity: 1, borderWidth: "30px" },
                        { transform: "translate(-50%, -50%) scale(20)", opacity: 0, borderWidth: "1px" }
                    ], { duration: 1200, easing: "ease-out" });
                    setTimeout(() => ring.remove(), 1200);

                    appContainer.animate([
                        { transform:"translateX(-5px)" },
                        { transform:"translateX(5px)" },
                        { transform:"translateX(-5px)" },
                        { transform:"translateX(5px)" }
                    ],{ duration: 300 });

                    collision.style.display = "none";
                    heartWrapper.style.display = "block";
                    heartWrapper.style.animation = "none";
                    heartWrapper.style.transform = "rotateY(0deg)";
                    
                    heart.innerHTML = "💘";
                    heart.style.animation = "none"; 
                    
                    void heart.offsetWidth; 
                    heart.classList.add("heart-pierced"); 
                    
                    setTimeout(() => {
                        heart.style.animation = "heartBeatAfterHit 1s infinite ease-in-out";
                    }, 600);

                    miniHeartInterval = setInterval(() => {
                        const h = document.createElement("div");
                        h.innerHTML = "❤️";
                        h.style.position = "absolute";
                        h.style.fontSize = "25px";
                        h.style.left = "50%";
                        h.style.top = "50%";
                        h.style.transform = "translate(-50%,-50%)";
                        h.style.pointerEvents = "none";
                        h.style.zIndex = "999";

                        appContainer.appendChild(h);

                        let x = (Math.random() - 0.5) * 300;
                        let y = (Math.random() - 0.5) * 300;

                        h.animate([
                            { transform: "translate(-50%,-50%) scale(1)", opacity:1 },
                            { transform: `translate(${x}px,${y}px) scale(0.5)`, opacity:0 }
                        ],{ duration: 1500 });

                        setTimeout(()=>h.remove(),1500);
                    },400);

                    heartExplosion();

                    appContainer.animate([
                        {transform:"scale(1)"},
                        {transform:"scale(1.08)"}
                    ],{
                        duration:3000,
                        fill:"forwards"
                    });

                    // ⏰ เด้งนาฬิกาโชว์เวลาที่ตกลงเป็นแฟนที่ด้านบน
                    timerDisplay.innerHTML = `เราเป็นแฟนกันตอน ${timeString} 💖`;
                    timerDisplay.style.opacity = '1';
                    timerDisplay.style.fontSize = 'clamp(0.85rem, 3vw, 1.1rem)';
                    timerDisplay.style.transform = 'scale(1.1)';
                    setTimeout(() => timerDisplay.style.transform = 'scale(1)', 300);

                    setTimeout(() => {
                        const finalSlide = document.getElementById('final-slide');
                        if (finalSlide) {
                            finalSlide.style.background = "radial-gradient(circle at center, rgba(255,80,120,0.6) 0%, rgba(255,80,120,0.2) 40%, transparent 80%)";
                        }
                    }, 1000);

                    // 💎 โชว์ Glass Card กลางจอ 
                    setTimeout(() => {
                        let box = document.createElement("div");
                        box.className = "premium-popup";
                        box.innerHTML = `
                            <div style="font-size:3rem;margin-bottom:15px;">💍</div>
                            <div style="color:#fff;font-size:1.5rem;line-height:1.4; text-shadow: 0 0 10px rgba(255,255,255,0.5);">
                                เย้! ตอนนี้เราเป็นแฟนกันแล้วนะ บีม ❤️
                            </div>
                            <div style="font-size:1rem;margin-top:15px;color:var(--love-pink);">
                                ดูแลทัตภณดีๆนะ โฮ่ง! 🐶
                            </div>
                        `;
                        appContainer.appendChild(box);
                        
                        if (navigator.vibrate) {
                            navigator.vibrate([200, 100, 200]);
                        }
                    }, 2500);

                    // 5️⃣ ขยับข้อความไปด้านบนสุด
                    setTimeout(()=>{
                        let text = document.createElement("div");
                        text.innerHTML = "ว้ายๆๆ โดนผมจีบติดแล้วนะครับ 😳";
                        text.style.position = "absolute";
                        text.style.top = "15%"; 
                        text.style.left = "50%";
                        text.style.transform = "translateX(-50%)";
                        text.style.width = "90%";
                        text.style.maxWidth = "90%";
                        text.style.margin = "0 auto";
                        text.style.textAlign = "center";
                        text.style.fontSize = "clamp(1.5rem,7vw,2.8rem)";
                        text.style.color = "white";
                        text.style.fontWeight = "500";
                        text.style.textShadow = "0 0 10px rgba(255,255,255,0.8)";
                        text.style.opacity = "0";
                        text.style.transition = "opacity 2s";
                        text.style.zIndex = "9999";
                        appContainer.appendChild(text);

                        setTimeout(()=>text.style.opacity="1", 100);
                    }, 5000);

                    // 🎬 6. THE END (ข้อความตอนจบ)
                    setTimeout(()=>{
                        let end = document.createElement("div");
                        end.style.position="absolute";
                        end.style.bottom="10%"; 
                        end.style.left="50%";
                        end.style.transform="translateX(-50%)";
                        end.style.width="90%";
                        end.style.maxWidth="90%";
                        end.style.margin="0 auto";
                        end.style.textAlign="center";
                        end.style.fontSize="clamp(1.5rem,7vw,2.8rem)";
                        end.style.color="#ff85a2";
                        end.style.zIndex="10000";
                        end.style.fontFamily="'Kanit', sans-serif";
                        end.style.fontWeight="700";
                        end.style.textShadow="0 0 20px rgba(255, 77, 109, 0.8)";
                        end.style.opacity="0";
                        end.style.transition="opacity 2s ease";
                        end.style.lineHeight="1.5";
                        
                        end.innerHTML="❤️ ยินดีด้วย คุณมีแฟนแล้ว ❤️<br>(แล้วก็เป็นผมด้วย 😏)";
                        appContainer.appendChild(end);

                        setTimeout(() => { end.style.opacity="1"; }, 100);
                    }, 8000); 

                }, 1500); 
            });
        });
    </script>
</body>
</html>
